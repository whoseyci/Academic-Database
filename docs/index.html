<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Academic Database · Claim Ledger</title>
<style>
:root{--bg:#0b1020;--panel:#121a30;--panel2:#17213b;--text:#edf2ff;--muted:#9fb0d0;--line:#263653;--accent:#7dd3fc;--accent2:#a78bfa;--good:#86efac;--warn:#fcd34d;--bad:#fca5a5;--chip:#24314f}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#1d2b55 0,#0b1020 36%,#080b14 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}header{position:sticky;top:0;z-index:50;background:rgba(10,15,30,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.bar{max-width:1360px;margin:auto;padding:14px 18px;display:flex;gap:14px;align-items:center;justify-content:space-between}.brand{font-weight:800;letter-spacing:.2px}.brand span{color:var(--accent)}.tabs{display:flex;flex-wrap:wrap;gap:8px}.tab{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:999px;padding:8px 12px;cursor:pointer}.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#07111f;border-color:transparent}.wrap{max-width:1360px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(18,26,48,.9);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.18)}.span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}.span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}.span12{grid-column:span 12}@media(max-width:900px){.span3,.span4,.span5,.span6,.span7,.span8{grid-column:span 12}.bar{align-items:flex-start;flex-direction:column}}h1,h2,h3{margin:0 0 10px}h1{font-size:28px}h2{font-size:20px}h3{font-size:16px}.muted{color:var(--muted)}.small{font-size:13px}.stat{font-size:30px;font-weight:850}.controls{display:grid;grid-template-columns:2fr repeat(5,1fr);gap:10px;margin-bottom:14px}.controls select,.controls input,.controls button,textarea{width:100%;border:1px solid var(--line);background:#0c1325;color:var(--text);border-radius:12px;padding:10px}button{cursor:pointer}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:12px;padding:9px 12px}.btn:hover{border-color:var(--accent)}.claim{border:1px solid var(--line);background:#0d1529;border-radius:16px;padding:14px;margin:10px 0}.claim-head{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}.id{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--accent)}.claim-text{font-size:16px;line-height:1.45;margin:10px 0}.evidence,.context{border-left:3px solid var(--accent);padding-left:10px;color:#d9e6ff}.context{white-space:pre-wrap;max-height:300px;overflow:auto;background:#09101f;border-radius:10px;padding:10px;margin-top:8px}.chips{display:flex;gap:6px;flex-wrap:wrap}.chip{font-size:12px;border-radius:999px;background:var(--chip);color:#cbd7f2;padding:4px 8px}.chip.good{background:#12351f;color:var(--good)}.chip.warn{background:#3b2d0b;color:var(--warn)}.chip.bad{background:#3b1115;color:var(--bad)}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}th{color:var(--muted);font-weight:700}.hidden{display:none!important}#graphCanvas{width:100%;height:680px;background:#080d19;border:1px solid var(--line);border-radius:18px}.legend{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.legend span{display:inline-flex;gap:6px;align-items:center}.dot{width:10px;height:10px;border-radius:999px;display:inline-block}.brief-section{border:1px solid var(--line);border-radius:14px;margin:12px 0;padding:12px;background:#0c1427}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.guidelines li{margin:7px 0}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:900px){.controls{grid-template-columns:1fr}.two{grid-template-columns:1fr}}</style>
</head>
<body>
<header><div class="bar"><div class="brand">Academic Database · <span>Claim Ledger</span></div><nav class="tabs" id="tabs"></nav></div></header>
<div class="wrap">
<section id="view-dashboard"></section>
<section id="view-explorer" class="hidden"></section>
<section id="view-claims" class="hidden"></section>
<section id="view-sources" class="hidden"></section>
<section id="view-network" class="hidden"></section>
<section id="view-briefs" class="hidden"></section>
<section id="view-guidelines" class="hidden"></section>
</div>
<script>
const state={data:null,view:'dashboard',claimFilter:{q:'',source:'',status:'',type:'',topic:'',representation:''},selectedClaim:null,graphMode:'topic'};
const tabs=[['dashboard','Dashboard'],['explorer','Topic Explorer'],['claims','Claims'],['sources','Sources'],['network','Network'],['briefs','Chapter Briefs'],['guidelines','Claim Guidelines']];
const colors={source:'#7dd3fc',claim:'#a78bfa',topic:'#86efac',year:'#fcd34d',claim_type:'#fca5a5',construct:'#60a5fa',rq:'#fb7185',discipline:'#34d399',geography:'#f59e0b',methodology:'#c084fc'};
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function chip(s,cls=''){return `<span class="chip ${cls}">${esc(s)}</span>`}
function byId(id){return document.getElementById(id)}
function setView(v){state.view=v; for(const [id] of tabs){byId('view-'+id).classList.toggle('hidden',id!==v)} document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); if(v==='network') setTimeout(drawGraph,50)}
async function load(){const res=await fetch('data/harness_export.json'); state.data=await res.json(); renderTabs(); renderAll(); setView('dashboard')}
function renderTabs(){byId('tabs').innerHTML=tabs.map(([id,label])=>`<button class="tab" data-view="${id}" onclick="setView('${id}')">${label}</button>`).join('')}
function renderAll(){renderDashboard(); renderExplorer(); renderClaims(); renderSources(); renderNetwork(); renderBriefs(); renderGuidelines()}
function uniq(arr){return [...new Set(arr.filter(Boolean))].sort()}
function countObj(o){return Object.entries(o||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k||'—')}</td><td>${v}</td></tr>`).join('')}
function renderDashboard(){const d=state.data,s=d.stats; byId('view-dashboard').innerHTML=`<div class="grid"><div class="card span12"><h1>Claim Ledger</h1><p class="muted">Static GitHub Pages view generated ${esc(d.generated_at)}. ${esc(d.notes)}</p></div><div class="card span3"><div class="muted">Sources</div><div class="stat">${s.source_count}</div></div><div class="card span3"><div class="muted">Claims</div><div class="stat">${s.claim_count}</div></div><div class="card span3"><div class="muted">Topics</div><div class="stat">${Object.keys(s.topic_counts||{}).length}</div></div><div class="card span3"><div class="muted">Chapter briefs</div><div class="stat">${d.chapter_briefs.length}</div></div><div class="card span4"><h2>Status</h2><table>${countObj(s.status_counts)}</table></div><div class="card span4"><h2>Claim types</h2><table>${countObj(s.claim_type_counts)}</table></div><div class="card span4"><h2>Topics</h2><table>${countObj(s.topic_counts)}</table></div><div class="card span12"><h2>Recommended writing workflow</h2><ol><li>Open a chapter brief.</li><li>Use claim IDs as the evidence backbone.</li><li>Click relevant claims to inspect evidence and context snippets.</li><li>Draft with claim IDs attached to substantive statements.</li><li>Verify candidate claims locally before final academic use.</li></ol></div></div>`}

const stopwords=new Set('the a an and or of in on for to with by from at as is are was were be been being this that these those it its into than then also not no can could should would may might study paper results result effect effects using used among across through between within overall more most less show shows showed found find suggests suggest indicates indicate likely because due about'.split(' '));
function tokenize(s){return String(s||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').match(/[a-z0-9][a-z0-9-]{2,}/g)?.map(w=>w.replace(/s$/,'')).filter(w=>!stopwords.has(w))||[]}
function expandQuery(q){const syn={trust:['institutional','policy','stability','confidence'],bureaucracy:['administrative','burden','procedures','paperwork'],flexibility:['contract','design','adapt','choice'],payment:['compensation','incentive','cost'],pollinator:['bee','bumblebee','bombus'],habitat:['semi-natural','nesting','food','pollen','nectar'],landscape:['context','composition','configuration'],norms:['social','peers','neighbouring','neighbors'],participation:['adoption','uptake','enrolment']};let toks=tokenize(q);let out=[...toks];for(const t of toks){if(syn[t])out.push(...syn[t])}return [...new Set(out)]}
function claimDoc(c){return [c.claim,c.evidence,c.topic,c.claim_type,c.source_title,c.citation_hint,c.tag_text,c.scope_note,c.context_snippet].join(' ')}
function topicSearch(q,opts={}){const toks=expandQuery(q); if(!toks.length)return[]; const phrase=String(q||'').toLowerCase(); return state.data.claims.map(c=>{if(opts.source&&c.source_id!==opts.source)return null;if(opts.status&&c.verification_status!==opts.status)return null;if(opts.type&&c.claim_type!==opts.type)return null;const doc=claimDoc(c); const low=doc.toLowerCase(); const dtoks=tokenize(doc); const freq=new Map(); dtoks.forEach(t=>freq.set(t,(freq.get(t)||0)+1)); let score=0,matched=[]; for(const t of toks){let f=freq.get(t)||0; if(!f){for(const d of freq.keys()){if(d.includes(t)||t.includes(d)){f=Math.max(f,.6);break}}} if(f){score+=Math.min(3,f)*1.2; matched.push(t)}} if(low.includes(phrase)&&phrase.length>4)score+=5; if(c.topic&&tokenize(c.topic).some(t=>toks.includes(t)))score+=2; if(c.verification_status==='verified')score+=2; if(c.page)score+=.5; return score>0?{...c,_score:Math.round(score*100)/100,_matched:[...new Set(matched)].slice(0,12)}:null}).filter(Boolean).sort((a,b)=>b._score-a._score)}
function renderExplorer(){const cs=state.data.claims; const sources=uniq(cs.map(c=>c.source_id)), statuses=uniq(cs.map(c=>c.verification_status)), types=uniq(cs.map(c=>c.claim_type)); byId('view-explorer').innerHTML=`<div class="grid"><div class="card span12"><h1>Topic Explorer</h1><p class="muted">Enter a topic or chapter idea. This runs client-side lexical retrieval over claims, evidence, tags and context snippets, then gives you related claims/observations. It is not an LLM and not true embedding search yet, but it is the intended writing interface for the static page.</p><div class="controls"><input id="topicQ" placeholder="e.g. trust and policy stability, contract flexibility, semi-natural habitats..."><select id="topicSource"><option value="">all sources</option>${sources.map(x=>`<option>${esc(x)}</option>`).join('')}</select><select id="topicStatus"><option value="">all statuses</option>${statuses.map(x=>`<option>${esc(x)}</option>`).join('')}</select><select id="topicType"><option value="">all claim types</option>${types.map(x=>`<option>${esc(x)}</option>`).join('')}</select><button class="btn" id="topicRun">find related claims</button><button class="btn" id="topicCopy">copy packet</button></div><div class="chips"><button class="btn small" onclick="topicExample('trust policy stability social norms participation')">trust/social norms</button><button class="btn small" onclick="topicExample('contract design flexibility bureaucracy payments')">contract design</button><button class="btn small" onclick="topicExample('semi-natural habitat colony density landscape context')">semi-natural habitat</button><button class="btn small" onclick="topicExample('limitations model phenology grassland forest underestimated')">limitations</button></div></div><div class="card span4"><h2>Observations</h2><div id="topicObs" class="small muted">Run a topic search to see source/topic/status coverage.</div></div><div class="card span8"><h2>Related claims</h2><div id="topicResults" class="muted">No topic searched yet.</div></div></div>`; byId('topicRun').onclick=runTopicExplorer; byId('topicQ').onkeydown=e=>{if(e.key==='Enter')runTopicExplorer()}; byId('topicCopy').onclick=copyTopicPacket}
function topicExample(q){setView('explorer'); byId('topicQ').value=q; runTopicExplorer()}
function runTopicExplorer(){const q=byId('topicQ').value; const opts={source:byId('topicSource').value,status:byId('topicStatus').value,type:byId('topicType').value}; const hits=topicSearch(q,opts).slice(0,30); state.lastTopicHits=hits; state.lastTopicQuery=q; const topics=count(hits.map(c=>c.topic)); const sources=count(hits.map(c=>c.source_id)); const statuses=count(hits.map(c=>c.verification_status)); const types=count(hits.map(c=>c.claim_type)); const warn=hits.length&&Object.keys(statuses).some(s=>s!=='verified')?'<p class="chip warn">Some results are not verified; use for drafting only after review.</p>':''; byId('topicObs').innerHTML=hits.length?`${warn}<p><b>${hits.length}</b> related claims found.</p><h3>Top topics</h3>${miniTable(topEntries(topics,6))}<h3>Sources</h3>${miniTable(topEntries(sources,6))}<h3>Status</h3>${miniTable(topEntries(statuses,6))}<h3>Claim types</h3>${miniTable(topEntries(types,6))}<p class="muted">Use the claim IDs as the evidence backbone, then inspect context snippets before drafting.</p>`:'No related claims found. Try broader wording or check the Claims tab.'; byId('topicResults').innerHTML=hits.map(c=>topicClaimHtml(c)).join('')||'<p class="muted">No related claims.</p>'}
function count(arr){const o={}; for(const x of arr.filter(Boolean))o[x]=(o[x]||0)+1; return o}
function topEntries(o,n){return Object.entries(o).sort((a,b)=>b[1]-a[1]).slice(0,n)}
function miniTable(entries){return `<table>${entries.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('')}</table>`}
function topicClaimHtml(c){return `<article class="claim"><div class="claim-head"><div>${chip('score '+c._score)} ${chip(c.verification_status,c.verification_status==='verified'?'good':'warn')} ${chip(c.topic)} ${chip(c.claim_type)}</div><button class="btn" onclick="copyText('${esc(c.claim_id)}')">copy ID</button></div><div class="id">${esc(c.claim_id)} · ${esc(c.citation_hint)} · p.${esc(c.page||'?')}</div><div class="claim-text">${esc(c.claim)}</div><div class="evidence small"><b>Evidence:</b> ${esc(c.evidence)}</div><p class="small muted"><b>Matched:</b> ${(c._matched||[]).map(x=>chip(x)).join(' ')}</p><details><summary class="muted">Context snippet</summary><div class="context">${esc(c.context_snippet||'No context snippet exported.')}</div></details></article>`}
function copyTopicPacket(){const hits=state.lastTopicHits||[]; const q=state.lastTopicQuery||''; const txt=['# Topic evidence packet: '+q,'',...hits.slice(0,15).flatMap(c=>[`- ${c.claim_id} (${c.citation_hint}, p.${c.page||'?'}, ${c.verification_status}): ${c.claim}`,`  Evidence: ${c.evidence}`,''])].join('\n'); navigator.clipboard?.writeText(txt)}

function filterClaims(){const f=state.claimFilter; const q=f.q.toLowerCase(); return state.data.claims.filter(c=>{if(f.source&&c.source_id!==f.source)return false;if(f.status&&c.verification_status!==f.status)return false;if(f.type&&c.claim_type!==f.type)return false;if(f.topic&&c.topic!==f.topic)return false;if(f.representation&&c.claim_representation!==f.representation)return false;if(q){const hay=[c.claim,c.evidence,c.source_title,c.citation_hint,c.topic,c.tag_text,c.scope_note].join(' ').toLowerCase(); if(!hay.includes(q))return false}return true})}
function renderClaims(){const cs=state.data.claims; const sources=uniq(cs.map(c=>c.source_id)), statuses=uniq(cs.map(c=>c.verification_status)), types=uniq(cs.map(c=>c.claim_type)), topics=uniq(cs.map(c=>c.topic)), reps=uniq(cs.map(c=>c.claim_representation)); byId('view-claims').innerHTML=`<div class="card"><h1>Claims</h1><div class="controls"><input id="claimQ" placeholder="Search claims, evidence, tags..."><select id="sourceF"><option value="">all sources</option>${sources.map(x=>`<option>${esc(x)}</option>`).join('')}</select><select id="statusF"><option value="">all statuses</option>${statuses.map(x=>`<option>${esc(x)}</option>`).join('')}</select><select id="typeF"><option value="">all types</option>${types.map(x=>`<option>${esc(x)}</option>`).join('')}</select><select id="topicF"><option value="">all topics</option>${topics.map(x=>`<option>${esc(x)}</option>`).join('')}</select><select id="repF"><option value="">all claim modes</option>${reps.map(x=>`<option>${esc(x)}</option>`).join('')}</select></div><div class="small muted" id="claimCount"></div><div id="claimList"></div></div>`; ['claimQ','sourceF','statusF','typeF','topicF','repF'].forEach(id=>byId(id).oninput=()=>{state.claimFilter={q:byId('claimQ').value,source:byId('sourceF').value,status:byId('statusF').value,type:byId('typeF').value,topic:byId('topicF').value,representation:byId('repF').value}; renderClaimList()}); renderClaimList()}
function renderClaimList(){const list=filterClaims(); byId('claimCount').textContent=`${list.length} claims shown`; byId('claimList').innerHTML=list.map(c=>claimHtml(c)).join('')||'<p class="muted">No claims match.</p>'}
function claimHtml(c){const statusCls=c.verification_status==='verified'?'good':c.verification_status==='rejected'?'bad':'warn'; const tags=(c.tags||[]).slice(0,10).map(t=>chip(`${t.tag_type}:${t.tag}`)).join(''); return `<article class="claim"><div class="claim-head"><div>${chip(c.verification_status,statusCls)} ${chip(c.claim_type)} ${chip(c.claim_representation)} ${chip(c.topic)}</div><button class="btn" onclick="copyText('${esc(c.claim_id)}')">copy ID</button></div><div class="id">${esc(c.claim_id)} · ${esc(c.citation_hint)} · p.${esc(c.page||'?')}</div><div class="claim-text">${esc(c.claim)}</div><div class="evidence small"><b>Evidence:</b> ${esc(c.evidence)}</div>${c.scope_note?`<p class="small muted"><b>Scope:</b> ${esc(c.scope_note)}</p>`:''}<div class="chips">${tags}</div><details><summary class="muted">Context snippet</summary><div class="context">${esc(c.context_snippet||'No context snippet exported.')}</div></details></article>`}
function copyText(t){navigator.clipboard?.writeText(t)}
function renderSources(){const rows=state.data.sources.map(s=>{const n=state.data.claims.filter(c=>c.source_id===s.source_id).length; return `<tr><td class="id">${esc(s.source_id)}</td><td>${esc(s.title)}</td><td>${esc(s.authors)}</td><td>${esc(s.year)}</td><td>${n}</td><td>${esc(s.disciplines||'')}</td><td>${s.doi?`<a href="https://doi.org/${esc(String(s.doi).replace(/^https?:\/\/doi.org\//,''))}" target="_blank">DOI</a>`:''}</td></tr>`}).join(''); byId('view-sources').innerHTML=`<div class="card"><h1>Sources</h1><table><thead><tr><th>ID</th><th>Title</th><th>Authors</th><th>Year</th><th>Claims</th><th>Disciplines</th><th>Link</th></tr></thead><tbody>${rows}</tbody></table></div>`}
function renderNetwork(){byId('view-network').innerHTML=`<div class="card"><h1>Network</h1><p class="muted">A lightweight Connected-Papers-style view over sources, claims, topics, dates and claim types. Drag nodes; use mode to simplify the graph.</p><div class="controls" style="grid-template-columns:repeat(4,1fr)"><select id="graphMode"><option value="topic">source-topic-claim</option><option value="paper">paper similarity</option><option value="date">source-date</option><option value="type">claim-type</option></select><button class="btn" onclick="drawGraph()">redraw</button><button class="btn" onclick="resetGraph()">reset layout</button><span class="muted small">Nodes are generated from exported database contents.</span></div><div class="legend">${Object.entries(colors).map(([k,v])=>`<span><i class="dot" style="background:${v}"></i>${k}</span>`).join('')}</div><canvas id="graphCanvas" width="1200" height="680"></canvas><div id="graphInfo" class="small muted"></div></div>`; byId('graphMode').onchange=e=>{state.graphMode=e.target.value; drawGraph()}; setTimeout(drawGraph,50)}
let graphState=null,drag=null;
function graphData(){const mode=byId('graphMode')?.value||'topic'; const nodes=[],edges=[]; const addN=n=>{if(!nodes.some(x=>x.id===n.id))nodes.push({...n})}; const addE=e=>edges.push({...e}); if(mode==='paper'){for(const s of state.data.sources)addN({id:'source:'+s.source_id,label:s.source_id,kind:'source'}); for(const e of state.data.network.paper_edges)addE({source:'source:'+e.source,target:'source:'+e.target,weight:Math.max(1,e.similarity*6),kind:'paper_similarity'}); if(!edges.length&&state.data.sources.length>1){for(let i=0;i<state.data.sources.length-1;i++)addE({source:'source:'+state.data.sources[i].source_id,target:'source:'+state.data.sources[i+1].source_id,weight:.5,kind:'no_shared_tags_demo'})}} else if(mode==='date'){for(const n of state.data.network.nodes.filter(n=>['source','year'].includes(n.kind)))addN(n); for(const e of state.data.network.edges.filter(e=>e.kind==='published_in'))addE(e)} else if(mode==='type'){for(const n of state.data.network.nodes.filter(n=>['source','claim','claim_type'].includes(n.kind)))addN(n); for(const e of state.data.network.edges.filter(e=>['has_claim','is_type'].includes(e.kind)))addE(e)} else {for(const n of state.data.network.nodes.filter(n=>['source','claim','topic','construct','rq'].includes(n.kind)))addN(n); for(const e of state.data.network.edges.filter(e=>['has_claim','about','tag:construct','tag:rq'].includes(e.kind)))addE(e)} return {nodes,edges,mode}}
function resetGraph(){graphState=null; drawGraph()}
function drawGraph(){const canvas=byId('graphCanvas'); if(!canvas)return; const ctx=canvas.getContext('2d'); const gd=graphData(); const W=canvas.width,H=canvas.height; if(!graphState||graphState.mode!==gd.mode){graphState={mode:gd.mode,nodes:gd.nodes.map((n,i)=>({...n,x:W/2+Math.cos(i)*250*Math.random(),y:H/2+Math.sin(i)*220*Math.random(),vx:0,vy:0})),edges:gd.edges};} const nodes=graphState.nodes, edges=graphState.edges, map=Object.fromEntries(nodes.map(n=>[n.id,n])); for(let step=0;step<70;step++){for(const n of nodes){n.vx+=(W/2-n.x)*0.0008;n.vy+=(H/2-n.y)*0.0008} for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+40;let f=180/d2; a.vx+=dx*f;b.vx-=dx*f;a.vy+=dy*f;b.vy-=dy*f} for(const e of edges){const a=map[e.source],b=map[e.target]; if(!a||!b)continue; let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1; let target=90+(e.weight||1)*8; let f=(d-target)*0.008; a.vx+=dx/d*f;b.vx-=dx/d*f;a.vy+=dy/d*f;b.vy-=dy/d*f} for(const n of nodes){n.vx*=0.86;n.vy*=0.86;n.x=Math.max(25,Math.min(W-25,n.x+n.vx));n.y=Math.max(25,Math.min(H-25,n.y+n.vy))}} ctx.clearRect(0,0,W,H); ctx.lineCap='round'; for(const e of edges){const a=map[e.source],b=map[e.target]; if(!a||!b)continue; ctx.strokeStyle='rgba(160,180,220,.22)'; ctx.lineWidth=Math.min(4,.7+(e.weight||1)*.4); ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()} for(const n of nodes){const r=n.kind==='source'?11:n.kind==='claim'?5:8; ctx.fillStyle=colors[n.kind]||'#94a3b8'; ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fill(); if(['source','topic','year','claim_type','rq','construct'].includes(n.kind)){ctx.fillStyle='#dbeafe';ctx.font='12px system-ui';ctx.fillText(n.label,n.x+r+3,n.y+4)}} byId('graphInfo').textContent=`${nodes.length} nodes · ${edges.length} edges · mode: ${gd.mode}`; canvas.onmousedown=ev=>{const rect=canvas.getBoundingClientRect(),x=(ev.clientX-rect.left)*canvas.width/rect.width,y=(ev.clientY-rect.top)*canvas.height/rect.height; drag=nodes.find(n=>(n.x-x)**2+(n.y-y)**2<160)}; canvas.onmousemove=ev=>{if(!drag)return;const rect=canvas.getBoundingClientRect();drag.x=(ev.clientX-rect.left)*canvas.width/rect.width;drag.y=(ev.clientY-rect.top)*canvas.height/rect.height;drawGraph()}; canvas.onmouseup=()=>drag=null; canvas.onmouseleave=()=>drag=null;}
function renderBriefs(){const briefs=state.data.chapter_briefs; byId('view-briefs').innerHTML=`<div class="card"><h1>Chapter Briefs</h1><p class="muted">Evidence packets prepared upfront for writing. Treat candidate claims as provisional until reviewed.</p>${briefs.map(renderBrief).join('')||'<p>No chapter briefs exported.</p>'}</div>`}
function renderBrief(b){return `<div class="brief-section"><h2>${esc(b.chapter_title||b.chapter_id)}</h2><p>${esc(b.purpose||'')}</p><div class="chips">${chip('claims: '+b.claim_count)} ${chip('sources: '+Object.keys(b.source_counts||{}).length)} ${(b.warnings||[]).map(w=>chip(w,'warn')).join('')}</div>${(b.sections||[]).map(sec=>`<details><summary><b>${esc(sec.heading||sec.section_id)}</b> · ${sec.claims.length} claims</summary><p class="muted">${esc(sec.writing_goal||'')}</p>${sec.claims.map(c=>`<div class="claim"><div class="id">${esc(c.claim_id)} · ${esc(c.citation_hint)} · p.${esc(c.page||'?')}</div><div>${esc(c.claim)}</div><div class="evidence small">${esc(c.evidence||'')}</div></div>`).join('')}</details>`).join('')}</div>`}
function renderGuidelines(){byId('view-guidelines').innerHTML=`<div class="card guidelines"><h1>Claim Guidelines</h1><p>A claim is an atomic, source-backed statement that can support academic writing.</p><div class="two"><div><h2>Claim test</h2><ol><li><b>Useful:</b> Could it support a sentence, paragraph, method justification or limitation?</li><li><b>Atomic:</b> Is it one idea, not a whole paragraph?</li><li><b>Source-backed:</b> Does it have exact evidence and a span/page?</li><li><b>Scoped:</b> Is it clear where it applies and where it does not?</li></ol></div><div><h2>Representation modes</h2><ul><li><b>source_quote:</b> use when source sentence is already clear and atomic.</li><li><b>lightly_normalized_source:</b> use for OCR/format cleanup.</li><li><b>paraphrase:</b> use only to split, clarify or compress; exact evidence remains mandatory.</li></ul></div></div><h2>Evidence ratio rule</h2><ul><li>Evidence should usually be 1 exact source sentence.</li><li>2 adjacent sentences are okay if the claim genuinely needs both.</li><li>Whole paragraphs/chunks are context, not evidence.</li><li>If more surroundings are needed, inspect the context snippet separately.</li></ul><h2>Claim types</h2><div class="chips">${['empirical finding','theoretical claim','methodological claim','definition','policy implication','limitation','background','contradiction'].map(x=>chip(x)).join('')}</div><h2>Not claims</h2><ul><li>headings, titles or keywords alone</li><li>isolated references</li><li>whole mixed paragraphs</li><li>unsupported model synthesis</li><li>vague topic labels</li></ul><h2>Best LLM workflow</h2><pre class="context">1. Identify an exact source sentence/excerpt that matters.
2. If atomic, mark it as source_quote.
3. If compound, split it into multiple claims.
4. If paraphrasing, preserve exact evidence quote.
5. Add type, tags, scope and confidence.

CLI:
python rh2.py mark-claim "exact source sentence" --source-id SOURCE_ID --json</pre><p><a href="CLAIM_GUIDELINES.md">Open full markdown guidelines</a></p></div>`}
load().catch(e=>{document.body.innerHTML='<pre style="color:white;padding:20px">Failed to load data/harness_export.json: '+e+'</pre>'})
</script>
